<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criativo — Cuidadora de Idosos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #F2EDE4;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: 1080px;
    height: 1080px;
    background: #F2EDE4;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 64px 80px 56px;
    overflow: hidden;
  }

  /* Background texture circles */
  .bg-circle-1 {
    position: absolute;
    width: 520px;
    height: 520px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(139, 174, 147, 0.12) 0%, transparent 70%);
    top: -100px;
    right: -100px;
    pointer-events: none;
  }

  .bg-circle-2 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(186, 156, 120, 0.10) 0%, transparent 70%);
    bottom: -80px;
    left: -80px;
    pointer-events: none;
  }

  .bg-dots {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(circle, rgba(100,100,80,0.06) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  /* Top badge */
  .badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #7A9E82;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 100px;
    z-index: 2;
  }

  .badge svg {
    width: 16px;
    height: 16px;
    fill: #fff;
    opacity: 0.9;
  }

  /* Center illustration */
  .illustration {
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    margin-top: -8px;
  }

  .hands-wrap {
    position: relative;
    width: 220px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .halo {
    position: absolute;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(122, 158, 130, 0.18) 0%, transparent 70%);
  }

  /* Main content block */
  .content {
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
    width: 100%;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 72px;
    font-weight: 300;
    color: #2A2A22;
    line-height: 1.08;
    letter-spacing: -0.01em;
    margin-bottom: 20px;
  }

  .headline em {
    font-style: italic;
    color: #7A9E82;
    font-weight: 400;
  }

  .subtext {
    font-family: 'DM Sans', sans-serif;
    font-size: 19px;
    font-weight: 300;
    color: #6B6455;
    line-height: 1.55;
    max-width: 640px;
    margin-bottom: 40px;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 36px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: rgba(122, 158, 130, 0.3);
  }

  .divider-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #7A9E82;
    opacity: 0.5;
  }

  /* Services list */
  .services {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 48px;
    margin-bottom: 0;
  }

  .service-item {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 17px;
    font-weight: 400;
    color: #3A3830;
  }

  .service-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(122, 158, 130, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .service-icon svg {
    width: 13px;
    height: 13px;
    stroke: #7A9E82;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* CTA */
  .cta-wrap {
    z-index: 2;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cta-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #25D366;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 20px;
    font-weight: 500;
    padding: 18px 48px;
    border-radius: 100px;
    letter-spacing: 0.01em;
    box-shadow: 0 8px 32px rgba(37, 211, 102, 0.28);
  }

  .cta-btn svg {
    width: 22px;
    height: 22px;
    fill: #fff;
  }

  /* Thin decorative border */
  .card::before {
    content: '';
    position: absolute;
    inset: 20px;
    border: 1px solid rgba(122, 158, 130, 0.20);
    border-radius: 4px;
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>
<div class="card">

  <div class="bg-circle-1"></div>
  <div class="bg-circle-2"></div>
  <div class="bg-dots"></div>

  <!-- Badge -->
  <div class="badge">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
    </svg>
    Técnica em Enfermagem
  </div>

  <!-- Illustration -->
  <div class="illustration">
    <div class="hands-wrap">
      <div class="halo"></div>
      <svg width="180" height="160" viewBox="0 0 180 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Heart -->
        <path d="M90 52 C90 52 70 34 55 38 C40 42 38 60 50 72 L90 110 L130 72 C142 60 140 42 125 38 C110 34 90 52 90 52Z"
              fill="rgba(122,158,130,0.18)" stroke="#7A9E82" stroke-width="2"/>
        <!-- Left hand -->
        <path d="M30 100 C30 100 20 92 18 84 C16 76 22 70 28 74 C28 74 26 64 32 62 C38 60 40 68 40 68 C40 68 40 58 46 57 C52 56 54 65 54 65 C54 65 56 57 62 57 C68 57 68 66 68 70 L68 110 C68 110 60 120 48 120 C36 120 30 110 30 100Z"
              fill="rgba(186,156,120,0.25)" stroke="#BA9C78" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Right hand -->
        <path d="M150 100 C150 100 160 92 162 84 C164 76 158 70 152 74 C152 74 154 64 148 62 C142 60 140 68 140 68 C140 68 140 58 134 57 C128 56 126 65 126 65 C126 65 124 57 118 57 C112 57 112 66 112 70 L112 110 C112 110 120 120 132 120 C144 120 150 110 150 100Z"
              fill="rgba(186,156,120,0.25)" stroke="#BA9C78" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Small sparkles -->
        <circle cx="90" cy="28" r="3" fill="#7A9E82" opacity="0.5"/>
        <circle cx="76" cy="22" r="2" fill="#7A9E82" opacity="0.3"/>
        <circle cx="104" cy="22" r="2" fill="#7A9E82" opacity="0.3"/>
      </svg>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <h1 class="headline">Seu familiar está<br>em <em>boas mãos.</em></h1>
    <p class="subtext">Cuidadora formada em Enfermagem disponível para cuidado domiciliar de idosos.</p>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <div class="services">
      <div class="service-item">
        <div class="service-icon">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        Medicação no horário
      </div>
      <div class="service-item">
        <div class="service-icon">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        Higiene e banho
      </div>
      <div class="service-item">
        <div class="service-icon">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        Refeições
      </div>
      <div class="service-item">
        <div class="service-icon">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        Companhia e segurança
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div class="cta-wrap">
    <div class="cta-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
      </svg>
      Chama no WhatsApp
    </div>
  </div>

</div>
</body>
</html>
