<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Criativo — Cuidadora de Idosos</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #fff;
  }

  .card {
    width: 1080px;
    height: 1080px;
    display: grid;
    grid-template-columns: 1fr 420px;
    position: relative;
    background: #fff;
    overflow: hidden;
  }

  /* ---- LEFT SIDE ---- */
  .left {
    background: #fff;
    padding: 72px 56px 60px 72px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    z-index: 2;
  }

  .top-block {}

  .name {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 68px;
    line-height: 1.0;
    color: #9B3060;
    text-transform: uppercase;
    letter-spacing: -1px;
    margin-bottom: 12px;
  }

  .role {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: #444;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1.3;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #9B3060;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 100px;
    margin-bottom: 40px;
  }

  /* Services */
  .services-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 20px;
  }

  .services {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .service-item {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .service-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: #FDF0F4;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .service-icon svg {
    width: 22px;
    height: 22px;
  }

  .service-text {
    font-family: 'Open Sans', sans-serif;
    font-size: 18px;
    font-weight: 400;
    color: #333;
    line-height: 1.3;
  }

  /* CTA */
  .cta {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #25D366;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 18px 32px;
    border-radius: 100px;
    width: fit-content;
    box-shadow: 0 8px 24px rgba(37,211,102,0.3);
  }

  .cta svg {
    width: 22px;
    height: 22px;
    fill: #fff;
    flex-shrink: 0;
  }

  /* ---- RIGHT SIDE ---- */
  .right {
    background: #9B3060;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Decorative circles */
  .right::before {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    border: 80px solid rgba(255,255,255,0.06);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .right::after {
    content: '';
    position: absolute;
    width: 380px;
    height: 380px;
    border-radius: 50%;
    border: 50px solid rgba(255,255,255,0.06);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .illustration {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .icon-wrap {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: rgba(255,255,255,0.85);
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    line-height: 1.4;
    padding: 0 32px;
  }

  .tagline span {
    display: block;
    font-size: 14px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.06em;
    margin-top: 8px;
  }

  /* Dot pattern */
  .dots {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  /* Diagonal cut between left and right */
  .cut {
    position: absolute;
    top: 0;
    left: -40px;
    width: 80px;
    height: 100%;
    background: #fff;
    clip-path: polygon(0 0, 100% 0, 0 100%);
    z-index: 3;
  }
</style>
</head>
<body>
<div class="card">

  <!-- LEFT -->
  <div class="left">
    <div class="top-block">
      <h1 class="name">Mariana<br>Caroline</h1>
      <p class="role">Cuidadora e Téc.<br>em Enfermagem</p>
      <div class="badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
        Serviços e Cuidados
      </div>
    </div>

    <div class="mid-block">
      <p class="services-title">O que eu ofereço</p>
      <div class="services">

        <div class="service-item">
          <div class="service-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#9B3060" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2z"/>
              <line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
          </div>
          <span class="service-text">Administração de medicamentos</span>
        </div>

        <div class="service-item">
          <div class="service-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#9B3060" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
            </svg>
          </div>
          <span class="service-text">Companhia e cuidado emocional</span>
        </div>

        <div class="service-item">
          <div class="service-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#9B3060" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </div>
          <span class="service-text">Higiene, banho e refeições</span>
        </div>

        <div class="service-item">
          <div class="service-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#9B3060" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <span class="service-text">Cuidados diurnos e noturnos</span>
        </div>

      </div>
    </div>

    <div class="cta">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
      </svg>
      Agende uma conversa
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="dots"></div>
    <div class="cut"></div>

    <div class="illustration">
      <div class="icon-wrap">
        <svg width="110" height="110" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Heart with hands simplified -->
          <path d="M50 80 C50 80 15 55 15 33 C15 22 24 14 34 16 C40 17 46 21 50 27 C54 21 60 17 66 16 C76 14 85 22 85 33 C85 55 50 80 50 80Z" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"/>
          <!-- Cross inside heart -->
          <line x1="50" y1="35" x2="50" y2="55" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <line x1="40" y1="45" x2="60" y2="45" stroke="white" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="tagline">
        Seu familiar<br>em boas mãos
        <span>Cuidado com formação e carinho</span>
      </div>
    </div>
  </div>

</div>
</body>
</html>
