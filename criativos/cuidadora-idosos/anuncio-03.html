<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Criativo 03 — Credencial em destaque</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
  }

  .card {
    width: 1080px;
    height: 1080px;
    background: #F5F0E8;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Top green bar */
  .top-bar {
    background: #1A5C38;
    padding: 36px 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .top-bar-name {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: #fff;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .top-bar-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 100px;
  }

  /* Main area */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 80px;
    gap: 0;
    position: relative;
  }

  /* Big credential */
  .credential-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 48px;
  }

  .credential-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 16px;
  }

  .credential-main {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 96px;
    line-height: 0.95;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: -2px;
    color: #1A5C38;
  }

  .credential-sub {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 28px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555;
    margin-top: 12px;
    text-align: center;
  }

  /* Divider with icon */
  .divider {
    display: flex;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 700px;
    margin-bottom: 48px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: #D4C9B8;
  }

  .divider-cross {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #1A5C38;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .divider-cross svg {
    width: 18px;
    height: 18px;
    stroke: #fff;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
  }

  /* Services grid */
  .services {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px 60px;
    margin-bottom: 56px;
    width: 100%;
    max-width: 760px;
  }

  .service-item {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: 'Open Sans', sans-serif;
    font-size: 18px;
    color: #3A3830;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #1A5C38;
    flex-shrink: 0;
  }

  /* CTA */
  .cta {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #25D366;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 20px 48px;
    border-radius: 100px;
    box-shadow: 0 8px 28px rgba(37,211,102,0.3);
  }

  .cta svg {
    width: 20px;
    height: 20px;
    fill: #fff;
  }

  /* Bottom strip */
  .bottom-strip {
    background: #1A5C38;
    height: 12px;
    flex-shrink: 0;
  }

  /* BG decoration */
  .bg-circle {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    border: 60px solid rgba(26,92,56,0.06);
    right: -150px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="card">

  <div class="top-bar">
    <span class="top-bar-name">Mariana Caroline</span>
    <div class="top-bar-badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      Formação Técnica
    </div>
  </div>

  <div class="main">
    <div class="bg-circle"></div>

    <div class="credential-wrap">
      <span class="credential-label">Profissional habilitada</span>
      <div class="credential-main">Técnica<br>em Enfer-<br>magem</div>
      <div class="credential-sub">Cuidadora de Idosos</div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-cross">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
      <div class="divider-line"></div>
    </div>

    <div class="services">
      <div class="service-item"><div class="dot"></div>Medicação no horário</div>
      <div class="service-item"><div class="dot"></div>Higiene e banho</div>
      <div class="service-item"><div class="dot"></div>Refeições</div>
      <div class="service-item"><div class="dot"></div>Companhia e segurança</div>
    </div>

    <div class="cta">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
      Agende uma conversa
    </div>
  </div>

  <div class="bottom-strip"></div>

</div>
</body>
</html>
