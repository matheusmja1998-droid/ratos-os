<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Criativo 02 — Foco na dor</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Lora:ital,wght@0,400;1,400;1,600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
  }

  .card {
    width: 1080px;
    height: 1080px;
    background: #9B3060;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    overflow: hidden;
  }

  /* Background texture */
  .bg-dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: 36px 36px;
  }

  .bg-circle {
    position: absolute;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .bg-circle-2 {
    position: absolute;
    width: 900px;
    height: 900px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.05);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* Top badge */
  .badge {
    position: absolute;
    top: 64px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 100px;
    white-space: nowrap;
    z-index: 2;
  }

  /* Main content */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
  }

  .eyebrow {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-bottom: 28px;
  }

  .headline {
    font-family: 'Lora', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 82px;
    line-height: 1.05;
    color: #fff;
    margin-bottom: 36px;
    max-width: 860px;
  }

  .headline span {
    color: #F4A7BC;
    font-style: italic;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 36px;
    width: 320px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.2);
  }

  .divider-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .divider-icon svg {
    width: 14px;
    height: 14px;
    fill: rgba(255,255,255,0.6);
  }

  .subtext {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 20px;
    color: rgba(255,255,255,0.65);
    line-height: 1.6;
    max-width: 620px;
    margin-bottom: 56px;
  }

  /* CTA */
  .cta {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fff;
    color: #9B3060;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 20px 48px;
    border-radius: 100px;
  }

  .cta svg {
    width: 20px;
    height: 20px;
    fill: #25D366;
  }

  /* Bottom name */
  .author {
    position: absolute;
    bottom: 56px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .author-line {
    width: 40px;
    height: 1px;
    background: rgba(255,255,255,0.25);
  }

  .author-name {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="card">
  <div class="bg-dots"></div>
  <div class="bg-circle"></div>
  <div class="bg-circle-2"></div>

  <div class="badge">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    Técnica em Enfermagem
  </div>

  <div class="content">
    <p class="eyebrow">Para famílias que se importam</p>

    <h1 class="headline">Enquanto você trabalha,<br>seu familiar está em<br><span>boas mãos.</span></h1>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-icon">
        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </div>
      <div class="divider-line"></div>
    </div>

    <p class="subtext">Cuidado domiciliar com formação técnica em enfermagem.<br>Medicação, higiene, refeições e companhia de verdade.</p>

    <div class="cta">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
      Agende uma conversa
    </div>
  </div>

  <div class="author">
    <div class="author-line"></div>
    <span class="author-name">Mariana Caroline — Cuidadora de Idosos</span>
    <div class="author-line"></div>
  </div>

</div>
</body>
</html>
